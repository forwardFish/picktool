services:
  postgres:
    image: postgres:16.4-alpine
    container_name: family_education_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
    volumes:
      - family_education_postgres_data:/var/lib/postgresql/data

volumes:
  family_education_postgres_data:
