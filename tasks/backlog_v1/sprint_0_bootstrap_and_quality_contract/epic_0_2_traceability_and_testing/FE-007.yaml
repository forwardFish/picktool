  - "Produce the evidence listed under expected_evidence and update the traceability row status accordingly."
story_outputs:
  - "Scoped code or documentation changes."
  - "Acceptance evidence tied to the declared test_case_ids."
  - "A delivery packet suitable for downstream Sprint Acceptance."
