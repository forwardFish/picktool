  - "Confirm the requirement and test scope before touching code or docs."
  - "Implement only the declared route/API/schema/document scope."
  - "Produce the evidence listed under expected_evidence and update the traceability row status accordingly."
story_outputs:
  - "Scoped code or documentation changes."
  - "Acceptance evidence tied to the declared test_case_ids."
  - "A delivery packet suitable for downstream Sprint Acceptance."
verification_basis:
  - "All declared test_case_ids execute or are deterministically evidenced."
  - "Review, code acceptance, and acceptance gate pass without blocker findings."
  - "Requirement rows tied to this Story move to Green only with evidence."
test_cases:
