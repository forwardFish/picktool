  - "Diagnosis 必须输出 Top 1–3 findings。"
  - "Diagnosis 必须区分 pattern vs sporadic。"
  - "Diagnosis/Plan 必须给出本周优先级与暂时不要做的事项。"
  - "Report 页必须提供 Diagnosis、Evidence、Plan 三个主要阅读面。"
constraints:
  - "Do not mark requirement rows green without attached evidence."
  - "Do not expand beyond the declared route/API/schema/document scope unless a blocker explicitly requires it."
  - "Collect browse, design, and browser QA evidence for the changed routes."
out_of_scope:
  - "Any requirement not explicitly listed in requirement_ids."
dependencies:
  - "FE-024"
preview_base_url: "http://127.0.0.1:3000"
preview_urls:
  - "http://127.0.0.1:3000/dashboard/reports/[reportId]"
qa_urls:
  - "http://127.0.0.1:3000/dashboard/reports/[reportId]"
related_files:
  - "app/(dashboard)/dashboard/reports/[reportId]/page.tsx"
  - "components/reports/DiagnosisTab.tsx"
primary_files:
  - "app/(dashboard)/dashboard/reports/[reportId]/page.tsx"
  - "components/reports/DiagnosisTab.tsx"
secondary_files:
  - "app/(dashboard)/dashboard/reports/[reportId]/page.tsx"
story_inputs:
  - "The linked requirement IDs from the PRD requirement index."
  - "The linked tests from the page/click/API/data/AI matrices."
  - "The current starter repository structure and route layout."
