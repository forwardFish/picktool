    - "Execute PAGE-RPT-001 and capture pass evidence."
    - "Execute PAGE-RPT-002 and capture pass evidence."
    - "Execute PAGE-RPT-003 and capture pass evidence."
  exception:
    - "Run the negative or edge coverage associated with PAGE-RPT-008."
