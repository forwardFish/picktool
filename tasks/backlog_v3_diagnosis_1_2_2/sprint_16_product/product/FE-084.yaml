  - "plan-eng-review"
  - "browse"
  - "qa"
  - "review"
  - "code_acceptance"
  - "acceptance_gate"
  - "doc_writer"
entry_criteria:
  - "Dependency accepted: FE-083."
  - "Read docs/需求文档_1.2_最终版.md section 4.6 before coding."
acceptance_criteria:
  - "Quality Gate assigns A/B/C/D or equivalent tiers from extraction, evidence, taxonomy, diagnosis, and plan checks."
  - "B-tier reports show cautious messaging; C/D-tier cases route to needs_review or block complete report publication."
  - "Runs page shows extraction, classification, diagnosis, plan, and quality-check stages."
constraints:
  - "Do not lower the evidence bar merely to publish more complete reports."
