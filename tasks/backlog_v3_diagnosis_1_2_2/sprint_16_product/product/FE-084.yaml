  - "app/(dashboard)/dashboard/runs/[runId]/page.tsx"
  - "app/(dashboard)/dashboard/reports/[reportId]/page.tsx"
  - "components/runs/*"
  - "components/reports/*"
primary_files:
  - "lib/reports/*"
  - "app/api/runs/[runId]/*"
  - "app/(dashboard)/dashboard/runs/[runId]/page.tsx"
  - "app/(dashboard)/dashboard/reports/[reportId]/page.tsx"
